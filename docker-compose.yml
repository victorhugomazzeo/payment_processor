services:
  db:
    container_name: db
    image: postgres:18
    restart: always
    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_USER: payments
      POSTGRES_DB: payments
    ports:
      - 5432:5432
    volumes:
      - db_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payments"]
      interval: 5s                 
      timeout: 3s                                         
      start_period: 10s      

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    restart: always
    ports:
      - 5672:5672
      - 15672:15672
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest 
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s                 
      timeout: 3s                                         
      start_period: 30s 

  admin:
    image: adminer
    restart: always
    depends_on: 
      - db
    ports:
      - 8080:8080
    
volumes:
  db_data:
